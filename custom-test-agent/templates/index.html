<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom AI Test Agent</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .card-header { font-weight: 600; }
        .sql-output {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            min-height: 200px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"> 🤖 Custom Test Data Agent (Local LLM)</a>
    </div>
</nav>

<div class="container mt-4">
    <!-- Step 1: Configuration -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">Step 1: Configuration</div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Database URI</label>
                    <input type="text" class="form-control" id="dbUri"
                           placeholder="postgresql://user:pass@localhost:5432/dbname"
                           value="postgresql://postgres:password@localhost:5432/testdb">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Feature Name</label>
                    <input type="text" class="form-control" id="featureName" placeholder="e.g., User Login Test">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Table Names (Comma Separated)</label>
                <input type="text" class="form-control" id="tableNames" placeholder="e.g., users, orders, products">
            </div>
        </div>
    </div>

    <!-- Step 2: Generation -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
            <span>Step 2: Generate Data</span>
            <button class="btn btn-light btn-sm" id="generateBtn" onclick="generateData()">Generate SQL</button>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <h6>Detected Schema</h6>
                    <div class="form-control" style="height: 300px; overflow-y: auto; background: #e9ecef;" id="schemaOutput">
                        <!-- Schema will appear here -->
                        <small class="text-muted">Click "Generate SQL" to fetch schema...</small>
                    </div>
                </div>
                <div class="col-md-8">
                    <h6>Generated SQL (Editable)</h6>
                    <textarea class="sql-output w-100" id="sqlOutput" style="height: 300px;" placeholder="AI Generated SQL will appear here..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Step 3: Execution -->
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <span>Step 3: Execution</span>
            <button class="btn btn-light btn-sm" id="executeBtn" onclick="executeSQL()">Execute SQL</button>
        </div>
        <div class="card-body">
            <div class="alert alert-info" id="statusBox" role="alert">
                Status: Waiting for input...
            </div>
            <div id="loader" style="display: none;" class="text-center">
                <div class="loader"></div> <small>Processing...</small>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function generateData() {
        const dbUri = document.getElementById('dbUri').value;
        const feature = document.getElementById('featureName').value;
        const tables = document.getElementById('tableNames').value;
        const statusBox = document.getElementById('statusBox');
        const loader = document.getElementById('loader');

        if(!feature || !tables) {
            alert("Please fill in Feature Name and Tables.");
            return;
        }

        // UI Loading State
        document.getElementById('generateBtn').disabled = true;
        loader.style.display = 'block';
        statusBox.className = "alert alert-warning";
        statusBox.innerText = "Status: Analyzing schema and querying local AI model...";

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    db_uri: dbUri,
                    feature_name: feature,
                    tables: tables
                })
            });

            const data = await response.json();

            if (data.status === 'success') {
                // Display Schema
                document.getElementById('schemaOutput').innerText = JSON.stringify(data.schema, null, 2);
                // Display SQL
                document.getElementById('sqlOutput').value = data.sql;

                statusBox.className = "alert alert-success";
                statusBox.innerText = "Status: SQL Generated successfully. Review and Execute.";
            } else {
                throw new Error(data.message);
            }
        } catch (error) {
            statusBox.className = "alert alert-danger";
            statusBox.innerText = "Error: " + error.message;
        } finally {
            loader.style.display = 'none';
            document.getElementById('generateBtn').disabled = false;
        }
    }

    async function executeSQL() {
        const dbUri = document.getElementById('dbUri').value;
        const sql = document.getElementById('sqlOutput').value;
        const statusBox = document.getElementById('statusBox');
        const loader = document.getElementById('loader');

        if(!sql) {
            alert("No SQL to execute.");
            return;
        }

        if(!confirm("Are you sure you want to execute this SQL against the database?")) return;

        // UI Loading State
        document.getElementById('executeBtn').disabled = true;
        loader.style.display = 'block';
        statusBox.className = "alert alert-warning";
        statusBox.innerText = "Status: Executing SQL Transaction...";

        try {
            const response = await fetch('/api/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    db_uri: dbUri,
                    sql: sql
                })
            });

            const data = await response.json();

            if (data.status === 'success') {
                statusBox.className = "alert alert-success";
                statusBox.innerText = "✅ SUCCESS: " + data.message;
            } else {
                throw new Error(data.message);
            }
        } catch (error) {
            statusBox.className = "alert alert-danger";
            statusBox.innerText = "❌ FAILED: " + error.message;
        } finally {
            loader.style.display = 'none';
            document.getElementById('executeBtn').disabled = false;
        }
    }
</script>

</body>
</html>
